name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["dev"]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            premake_action: vs2022
          - name: Linux x64
            os: ubuntu-24.04
            premake_action: gmake2
          - name: macOS x64
            os: macos-15-intel
            premake_action: gmake2

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcurl4-openssl-dev \
            wget

      - name: Install premake5 on Linux
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-linux.tar.gz -O premake5.tar.gz
          tar xf premake5.tar.gz
          chmod +x premake5
          sudo mv premake5 /usr/local/bin/premake5
          rm premake5.tar.gz

      - name: Install premake5 on macOS
        if: runner.os == 'macOS'
        run: brew install premake

      - name: Install premake5 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile premake5.zip
          Expand-Archive -Force premake5.zip -DestinationPath premake5_bin
          Move-Item premake5_bin\premake5.exe C:\Windows\System32\premake5.exe

      - name: Setup MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Generate build files
        run: premake5 ${{ matrix.premake_action }}

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: msbuild Interpreter.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m /nologo /clp:"Summary;ErrorsOnly"

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: make -j$(nproc) config=release_x64

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: make -j$(sysctl -n hw.logicalcpu) config=release_x64

      - name: Smoke binaries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./bin/mType/Release/x64/mType.exe --version
          ./bin/mtpm/Release/x64/mtpm.exe --version
          ./bin/mtype-language-server/Release/x64/mtype-language-server.exe --version
          ./bin/mType/Release/x64/mType.exe --help
          ./bin/mtpm/Release/x64/mtpm.exe --help

      - name: Smoke binaries on Unix
        if: runner.os != 'Windows'
        run: |
          ./bin/mType/Release/x64/mType --version
          ./bin/mtpm/Release/x64/mtpm --version
          ./bin/mtype-language-server/Release/x64/mtype-language-server --version
          ./bin/mType/Release/x64/mType --help
          ./bin/mtpm/Release/x64/mtpm --help

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./bin/mType/Release/x64/mType.exe --tests
          ./bin/mType/Release/x64/mType.exe --tests --no-jit
          ./bin/mtype-language-server-tests/Release/x64/mtype-language-server-tests.exe

      - name: Run tests on Unix
        if: runner.os != 'Windows'
        run: |
          ./bin/mType/Release/x64/mType --tests
          ./bin/mType/Release/x64/mType --tests --no-jit
          ./bin/mtype-language-server-tests/Release/x64/mtype-language-server-tests

  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-24.04
    # Opt actions/upload-artifact into Node 24 ahead of the 2026-06-02 default
    # flip (suppresses the deprecation warning until upstream ships v6).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mtype-vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: mtype-vscode-extension
        run: npm ci

      - name: Compile
        working-directory: mtype-vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: mtype-vscode-extension
        run: npx --yes @vscode/vsce package

      - name: Upload VSIX smoke artifact
        uses: actions/upload-artifact@v5
        with:
          name: mtype-language-support-vsix
          path: mtype-vscode-extension/*.vsix
          if-no-files-found: error
          retention-days: 7
