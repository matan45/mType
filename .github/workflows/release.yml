name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  native:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Opt actions/upload-artifact into Node 24 ahead of the 2026-06-02 default
    # flip (suppresses the deprecation warning until upstream ships v6).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            premake_action: vs2022
            archive: mType-${{ github.ref_name }}-windows-x64.zip
          - name: linux-x64
            os: ubuntu-24.04
            premake_action: gmake2
            archive: mType-${{ github.ref_name }}-linux-x64.tar.gz
          - name: macos-x64
            os: macos-15-intel
            premake_action: gmake2
            archive: mType-${{ github.ref_name }}-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcurl4-openssl-dev \
            wget

      - name: Install premake5 on Linux
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-linux.tar.gz -O premake5.tar.gz
          tar xf premake5.tar.gz
          chmod +x premake5
          sudo mv premake5 /usr/local/bin/premake5
          rm premake5.tar.gz

      - name: Install premake5 on macOS
        if: runner.os == 'macOS'
        run: brew install premake

      - name: Install premake5 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/premake/premake-core/releases/download/v5.0.0-beta4/premake-5.0.0-beta4-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile premake5.zip
          Expand-Archive -Force premake5.zip -DestinationPath premake5_bin
          Move-Item premake5_bin\premake5.exe C:\Windows\System32\premake5.exe

      - name: Setup MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Generate build files
        run: premake5 ${{ matrix.premake_action }}

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: msbuild Interpreter.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m /nologo /clp:"Summary;ErrorsOnly"

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: make -j$(nproc) config=release_x64

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: make -j$(sysctl -n hw.logicalcpu) config=release_x64

      - name: Test release binaries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./bin/mType/Release/x64/mType.exe --tests
          ./bin/mType/Release/x64/mType.exe --tests --no-jit
          ./bin/mtype-language-server-tests/Release/x64/mtype-language-server-tests.exe
          ./bin/mType/Release/x64/mType.exe --version
          ./bin/mtpm/Release/x64/mtpm.exe --version
          ./bin/mtype-language-server/Release/x64/mtype-language-server.exe --version

      - name: Test release binaries on Unix
        if: runner.os != 'Windows'
        run: |
          ./bin/mType/Release/x64/mType --tests
          ./bin/mType/Release/x64/mType --tests --no-jit
          ./bin/mtype-language-server-tests/Release/x64/mtype-language-server-tests
          ./bin/mType/Release/x64/mType --version
          ./bin/mtpm/Release/x64/mtpm --version
          ./bin/mtype-language-server/Release/x64/mtype-language-server --version

      - name: Stage package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "dist/mType-${{ github.ref_name }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item bin/mType/Release/x64/mType.exe $stage/
          Copy-Item bin/mType/Release/x64/mtype-launcher.exe $stage/
          Copy-Item bin/mtpm/Release/x64/mtpm.exe $stage/
          Copy-Item bin/mtype-language-server/Release/x64/mtype-language-server.exe $stage/
          Copy-Item mType/tests/testFiles/lib "$stage/lib" -Recurse
          Copy-Item docs "$stage/docs" -Recurse
          Copy-Item README.md,LICENSE,CHANGELOG.md,RELEASE.md $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Stage package on Unix
        if: runner.os != 'Windows'
        run: |
          stage="dist/mType-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir -p "$stage"
          cp bin/mType/Release/x64/mType "$stage/"
          cp bin/mType/Release/x64/mtype-launcher "$stage/"
          cp bin/mtpm/Release/x64/mtpm "$stage/"
          cp bin/mtype-language-server/Release/x64/mtype-language-server "$stage/"
          cp -R mType/tests/testFiles/lib "$stage/lib"
          cp -R docs "$stage/docs"
          cp README.md LICENSE CHANGELOG.md RELEASE.md "$stage/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "mType-${{ github.ref_name }}-${{ matrix.name }}"

      - name: Upload native package
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  vscode-extension:
    name: Package VS Code extension
    runs-on: ubuntu-24.04
    # Opt actions/upload-artifact into Node 24 ahead of the 2026-06-02 default
    # flip (suppresses the deprecation warning until upstream ships v6).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mtype-vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: mtype-vscode-extension
        run: npm ci

      - name: Compile
        working-directory: mtype-vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: mtype-vscode-extension
        run: |
          mkdir -p ../dist
          npx --yes @vscode/vsce package --out ../dist/mtype-language-support-${{ github.ref_name }}.vsix

      - name: Upload VSIX package
        uses: actions/upload-artifact@v5
        with:
          name: mtype-language-support-${{ github.ref_name }}.vsix
          path: dist/mtype-language-support-${{ github.ref_name }}.vsix
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [native, vscode-extension]

    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mType ${{ github.ref_name }}
          body: |
            mType ${{ github.ref_name }} release.

            See CHANGELOG.md and RELEASE.md for release notes and validation steps.
          files: release-assets/*
